name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.12"
          - os: ubuntu-latest
            python-version: "3.13"
          - os: ubuntu-latest
            python-version: "3.14"
          - os: windows-latest
            python-version: "3.14"
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"
          enable-cache: true
      - name: Install Python
        run: uv python install ${{ matrix.python-version }}
      - name: Synchronize locked environment
        run: uv sync --locked --extra dev --python ${{ matrix.python-version }}
      - name: Run tests
        run: uv run --frozen --python ${{ matrix.python-version }} pytest

  quality:
    name: Static checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"
          enable-cache: true
      - name: Synchronize locked environment
        run: uv sync --locked --extra dev
      - name: Lint
        run: uv run --frozen ruff check .
      - name: Check formatting
        run: uv run --frozen ruff format --check .
      - name: Build wheel from publishable metadata
        run: uv build --wheel --no-sources --clear
      - name: Smoke-test installed wheel
        run: uv run --isolated --no-project --with ./dist/*.whl cmt-lab --help
